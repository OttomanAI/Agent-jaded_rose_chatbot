<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaded Rose — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .landing {
      max-width: 460px;
      padding: 40px 24px;
    }
    .landing h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: .5px;
    }
    .landing p {
      font-size: 16px;
      color: #999;
      line-height: 1.6;
    }
    .landing p.hint {
      margin-top: 28px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>✨ Jaded Rose</h1>
    <p>
      Need help with an order, sizing, returns or anything else?<br />
      Click the chat bubble in the bottom-right corner to get started.
    </p>
    <p class="hint">This page can be embedded in a Shopify theme or used standalone for testing.</p>
  </div>

  <!-- Jaded Rose Chat Widget -->
  <script src="/static/widget.js"></script>
</body>
</html>
